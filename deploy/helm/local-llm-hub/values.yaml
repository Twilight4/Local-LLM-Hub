# Base values. Secrets (masterKey) go in gitignored values.local.yaml.
namespace: local-llm-hub

images:
  ollama:
    repository: ollama/ollama
    tag: "0.32.0"
    digest: sha256:57f573b47f1f71ebb445789f279fe3e596a8beab182f7cf486db9205bad87c5a
  litellm:
    repository: ghcr.io/berriai/litellm
    tag: "v1.92.0"
    digest: sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
  qdrant:
    repository: qdrant/qdrant
    tag: "v1.18.2"
    digest: sha256:75eab8c4ba42096724fdcfde8b4de0b5713d529dde32f285a1f86fdcb2c9e50c
  phoenix:
    repository: arizephoenix/phoenix
    tag: "18.1.0"
    digest: sha256:3703cf74388218163d4b599892c4c47560a6003b117d68896963a88898fe7815
  openWebui:
    repository: ghcr.io/open-webui/open-webui
    tag: main
    digest: sha256:a26effeb220e132482bf7e0560b3404843e7bc40d23051144e062960df8df6b0

ollama:
  models: ["llama3.2", "nomic-embed-text"]
  storage: 30Gi

qdrant:
  storage: 5Gi

phoenix:
  storage: 2Gi
  enableAuth: "false"

openWebui:
  storage: 2Gi
  defaultModelMetadata: '{"capabilities":{"builtin_tools":false}}'

litellm:
  config: |
    model_list:
      - model_name: llama3.2
        litellm_params:
          model: ollama/llama3.2
          api_base: http://ollama:11434
      - model_name: nomic-embed-text
        litellm_params:
          model: ollama/nomic-embed-text
          api_base: http://ollama:11434
    litellm_settings:
      success_callback: ["otel"]
  otel:
    endpoint: http://phoenix:6006
    protocol: http/protobuf
    serviceName: litellm

service:
  type: NodePort

masterKey: ""   # set in values.local.yaml (gitignored)

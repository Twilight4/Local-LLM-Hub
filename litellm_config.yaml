# LiteLLM proxy config — OpenAI-compatible gateway over local Ollama.
# Auth: master key is read automatically from env LITELLM_MASTER_KEY.
model_list:
  - model_name: llama3.2
    litellm_params:
      model: ollama/llama3.2
      api_base: http://ollama:11434

  - model_name: nomic-embed-text          # embeddings endpoint (/v1/embeddings)
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

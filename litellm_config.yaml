# LiteLLM proxy config — OpenAI-compatible gateway over local Ollama.
# Auth: the master key is read automatically from env LITELLM_MASTER_KEY.
model_list:
  - model_name: llama3.2            # friendly name clients send in "model"
    litellm_params:
      model: ollama/llama3.2        # provider prefix + Ollama model name
      api_base: http://ollama:11434 # internal compose service DNS
      # Ollama needs no api_key; the LiteLLM master key gates the public API.

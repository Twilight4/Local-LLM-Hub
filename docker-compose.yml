# local-llm-hub — local LLM infra: Ollama + LiteLLM + Qdrant (RAG) + Phoenix (observability).
# Bring up:  docker compose up -d
services:
  ollama:
    image: ollama/ollama:0.32.0@sha256:57f573b47f1f71ebb445789f279fe3e596a8beab182f7cf486db9205bad87c5a            # pinned version + digest, never "latest"
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"            # Ollama's own API, loopback only (debug/pull)
    volumes:
      - ollama-data:/root/.ollama          # named volume: downloaded models survive restarts
    # GPU is opt-in: apply docker-compose.gpu.yml to pass /dev/dri + /dev/kfd through.
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  litellm:
    image: ghcr.io/berriai/litellm:v1.92.0@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
    container_name: litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    ports:
      - "127.0.0.1:4000:4000"              # THE single public entry point
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro   # bind-mount our config, read-only
    env_file: [.env]                       # master key injected from here (gitignored)
    environment:                           # send every request's trace to Phoenix via OTel/OTLP
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:6006
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_SERVICE_NAME: litellm
    depends_on:
      ollama:
        condition: service_healthy         # don't start LiteLLM until Ollama is ready
      phoenix:
        condition: service_started
    healthcheck:
      # python ships in the litellm image; curl is not
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 25s

  qdrant:
    image: qdrant/qdrant:v1.18.2@sha256:75eab8c4ba42096724fdcfde8b4de0b5713d529dde32f285a1f86fdcb2c9e50c          # pinned latest stable (2026-06) + digest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"             # REST + web dashboard
      - "127.0.0.1:6334:6334"             # gRPC (faster for bulk upserts)
    volumes:
      - qdrant-data:/qdrant/storage       # collections + vectors persist here
    healthcheck:                          # Qdrant image ships bash; if this errors, delete the block
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  phoenix:
    image: arizephoenix/phoenix:18.1.0@sha256:3703cf74388218163d4b599892c4c47560a6003b117d68896963a88898fe7815      # pinned (arize-phoenix v18.1.0) + digest
    container_name: phoenix
    restart: unless-stopped
    environment:
      PHOENIX_ENABLE_AUTH: "false"          # local single-user; UI + OTLP open on loopback only
    ports:
      - "127.0.0.1:6006:6006"               # Phoenix UI (browser); OTLP 4317/4318 are internal-only
    volumes:
      - phoenix-data:/mnt/data              # embedded SQLite store persists here

volumes:
  ollama-data:
  qdrant-data:
  phoenix-data:

# Stack: ollama + litellm + qdrant + phoenix — all bound to 127.0.0.1.

name: Dependabot auto-merge

# Auto-merges Dependabot PRs once their CI passes. Human-raised PRs are
# left alone. The chat-endpoint test (config-test.yml) gates every
# image bump before auto-merge fires.
#
# One-time prerequisite: enable "Allow auto-merge" in repo
# Settings → General → Pull Requests.

on:
  pull_request:

permissions:
  contents: write       # merge into the target branch
  pull-requests: write  # enable auto-merge on the PR

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash on green CI)
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

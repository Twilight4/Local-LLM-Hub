name: config-test

# Brings up the stack with the mock-Ollama CI override and asserts a chat
# completion returns valid OpenAI JSON. Guards every change to the actual
# LiteLLM / compose config.
on:
  push:
    branches: [main]
    paths:
      - 'litellm_config.yaml'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - '.env.example'
      - 'ci/**'
      - '.github/workflows/config-test.yml'
  pull_request:
    paths:
      - 'litellm_config.yaml'
      - 'docker-compose.yml'
      - 'docker-compose.ci.yml'
      - '.env.example'
      - 'ci/**'
      - '.github/workflows/config-test.yml'

jobs:
  chat-endpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Bring up stack with mock Ollama
        run: |
          touch .env   # base compose reads env_file; CI has no secrets
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            up -d --wait --scale qdrant=0 --scale phoenix=0 --scale open-webui=0

      - name: Assert chat completion returns valid JSON
        run: ./ci/test_chat.sh

      - name: Assert streaming response returns SSE chunks
        run: ./ci/test_streaming.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
